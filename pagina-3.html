<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Tabuada</title>
    <link rel="stylesheet" href="pagina-3.css">
</head>
<body>
    <div class="container">
        <h1>Super Tabuada</h1>
        
        <div class="form-group">
            <label for="numero">Digite um número:</label>
            <input type="number" id="numero" placeholder="Ex: 7">
        </div>

        <div class="form-group">
            <label for="operacao">Escolha a operação:</label>
            <select id="operacao">
                <option value="multiplicacao">Multiplicação (✕)</option>
                <option value="adicao">Adição (+)</option>
                <option value="subtracao">Subtração (−)</option>
                <option value="divisao">Divisão (÷)</option>
            </select>
        </div>

        <button onclick="gerarTabuada()">Gerar Tabuada</button>

        <ul id="tabuada"></ul>

        <div class="navegacao">
            <a href="pagina-2.html" class="nav-btn">« Voltar</a>
            <a href="pagina-4.html" class="nav-btn">Próxima »</a>
        </div>
    </div>
    <script src="pagina-3.js"></script>
</body>
</html>
